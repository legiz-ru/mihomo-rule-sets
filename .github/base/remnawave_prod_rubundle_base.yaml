  rknasnblock:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://cdn.jsdelivr.net/gh/legiz-ru/mihomo-rule-sets@main/ru-bundle/rknasnblock.mrs
    path: ./ru-bundle/rknasnblock.mrs
    interval: 86400
    proxy: 🌍 VPN
  apps_ipcheck:
    type: inline
    payload:
      - DOMAIN,ipwho.is
      - DOMAIN,api.ip.sb
      - DOMAIN,ipapi.co
      - DOMAIN,ipinfo.io
      - DOMAIN,ip-api.com
    behavior: classical

rules:
  - RULE-SET,apps_ipcheck,🌍 VPN
  - RULE-SET,ads-all,REJECT # Блокировка рекламы, трекинга и тд
  - RULE-SET,ru-app-list,♻️ БезVPN # Российские приложения полностью без прокси
  - OR,((RULE-SET,torrent-clients),(RULE-SET,torrent-trackers)),♻️ БезVPN # Принудительное директирование торрент трекеров и приложений
  - RULE-SET,youtube,▶️ YouTube 
  - OR,((RULE-SET,whatsapp_domains),(RULE-SET,meta_ips)),🌍 VPN
  - OR,((RULE-SET,telegram_domains),(RULE-SET,telegram_ips)),🌍 VPN
  - OR,((RULE-SET,discord_domains),(RULE-SET,discord_voiceips)),🌍 VPN
  - OR,((PROCESS-NAME,Discord.exe),(PROCESS-NAME,org.cromite.cromite)),🌍 VPN
  - RULE-SET,ru-bundle,🌍 VPN
  # - RULE-SET,refilter_domains,🌍 VPN
  # - RULE-SET,refilter_ipsum,🌍 VPN
  - RULE-SET,cloudflare,🌍 VPN
  - RULE-SET,rknasnblock,🌍 VPN
  - MATCH,♻️ БезVPN