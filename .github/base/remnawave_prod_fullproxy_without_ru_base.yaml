remnawave:
  includeHiddenHosts: false

x-anchors:
  reserved_ips: &reserved_ips
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/3

  dns_ru: &dns_ru
    - 77.88.8.8
    - 77.88.8.1

  dns_proxy: &dns_proxy
    - https://8.8.8.8/dns-query#🌍 VPN
    - https://1.1.1.1/dns-query#🌍 VPN

  pr_http: &pr_http
    type: http
    interval: 86400
    proxy: 🌍 VPN

  rp_classical: &rp_classical
    <<: *pr_http
    behavior: classical
    format: yaml

  rp_domain: &rp_domain
    <<: *pr_http
    behavior: domain
    format: mrs

  rp_ipcidr: &rp_ipcidr
    <<: *pr_http
    behavior: ipcidr
    format: mrs

tcp-concurrent: true
enable-process: true
find-process-mode: strict
mode: rule
log-level: error
ipv6: false
keep-alive-interval: 30
keep-alive-idle: 30
unified-delay: true
geodata-loader: memconservative

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
        - 8443
  skip-dst-address: *reserved_ips

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  route-exclude-address: *reserved_ips

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  cache-algorithm: arc
  prefer-h3: false
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:geosite-private
    - "+.lan"
    - "+.local"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
  default-nameserver: *dns_ru
  nameserver: *dns_proxy
  proxy-server-nameserver: *dns_ru
  nameserver-policy:
    rule-set:geosite-private:
      - system
    rule-set:ads-all:
      - rcode://refused
    "*.lan,*.local": [192.168.1.1, system]
    "rule-set:youtube,category-ban-ru,whatsapp_domains,telegram_domains,discord_domains": *dns_proxy
    "rule-set:geosite-ru": *dns_ru

proxy-groups:
  - name: 🌍 VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    proxies:
      - ⚡️ Fastest
      # LEAVE THIS LINE!

  - name: ⚡️ Fastest
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    lazy: true
    tolerance: 150
    url: https://captive.apple.com/generate_204
    interval: 300
    proxies:
      # LEAVE THIS LINE!

  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    proxies:
      - 🌍 VPN
      # LEAVE THIS LINE!

  - name: ♻️ БезVPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png
    remnawave:
      include-proxies: false
    type: select
    hidden: true
    proxies:
      - DIRECT

rule-providers:
  geosite-private:
    <<: *rp_domain
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/private.mrs
    path: ./geosite-private.mrs
  geoip-private:
    <<: *rp_ipcidr
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/private.mrs
    path: ./geoip-private.mrs
  ads-all:
    <<: *rp_domain
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/category-ads-all.mrs
    path: ./ads-all.mrs
  torrent-trackers:
    <<: *rp_domain
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/torrent-trackers.mrs
    path: ./rule-sets/torrent-trackers.mrs
  torrent-clients:
    <<: *rp_classical
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/torrent-clients.yaml
    path: ./rule-sets/torrent-clients.yaml
  youtube:
    <<: *rp_domain
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/youtube.mrs
    path: ./geosite-youtube.mrs
  category-ban-ru:
    <<: *rp_domain
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/category-ban-ru.mrs
    path: ./category-ban-ru.mrs
  whatsapp_domains:
    <<: *rp_domain
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/whatsapp.mrs
    path: ./rule-sets/whatsapp_domains.mrs
  meta_ips:
    <<: *rp_ipcidr
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/facebook.mrs
    path: ./rule-sets/meta_ips.mrs
  telegram_domains:
    <<: *rp_domain
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/telegram.mrs
    path: ./rule-sets/telegram_domains.mrs
  telegram_ips:
    <<: *rp_ipcidr
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/telegram.mrs
    path: ./rule-sets/telegram_ips.mrs
  discord_domains:
    <<: *rp_domain
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/discord.mrs
    path: ./rule-sets/discord_domains.mrs
  discord_voiceips:
    <<: *rp_ipcidr
    url: https://cdn.jsdelivr.net/gh/legiz-ru/mihomo-rule-sets@main/other/discord-voice-ip-list.mrs
    path: ./rule-sets/discord_voiceips.mrs
  ru-app-list:
    <<: *rp_classical
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/ru-app-list.yaml
    path: ./rule-sets/ru-app-list.yaml
  games-direct:
    <<: *rp_classical
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/games-direct.yaml
    path: ./rule-sets/games-direct.yaml
  geosite-ru:
    <<: *rp_domain
    url: https://raw.githubusercontent.com/Davoyan/mihomo-rule-sets/main/rules/category-ru.mrs
    path: ./rule-sets/geosite-ru.mrs
  geoip-ru:
    <<: *rp_ipcidr
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/ru.mrs
    path: ./geoip-ru.mrs

rules:
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - RULE-SET,ads-all,REJECT
  - IP-CIDR,17.0.0.0/8,♻️ БезVPN,no-resolve
  - OR,((DST-PORT,5223),(DOMAIN-SUFFIX,push.apple.com)),♻️ БезVPN
  - OR,((DST-PORT,5228-5230),(DOMAIN-KEYWORD,mtalk),(DOMAIN-SUFFIX,fcm.googleapis.com),(DOMAIN-SUFFIX,fcm-xmpp.googleapis.com)),♻️ БезVPN
  - RULE-SET,geosite-private,♻️ БезVPN
  - RULE-SET,geoip-private,♻️ БезVPN,no-resolve
  - OR,((RULE-SET,torrent-clients),(RULE-SET,torrent-trackers)),♻️ БезVPN
  - RULE-SET,ru-app-list,♻️ БезVPN
  - RULE-SET,games-direct,♻️ БезVPN
  - RULE-SET,youtube,▶️ YouTube
  - RULE-SET,category-ban-ru,🌍 VPN
  - OR,((RULE-SET,whatsapp_domains),(RULE-SET,meta_ips)),🌍 VPN
  - OR,((RULE-SET,telegram_domains),(RULE-SET,telegram_ips)),🌍 VPN
  - OR,((RULE-SET,discord_domains),(RULE-SET,discord_voiceips)),🌍 VPN
  - RULE-SET,geosite-ru,♻️ БезVPN
  - RULE-SET,geoip-ru,♻️ БезVPN
  - MATCH,🌍 VPN